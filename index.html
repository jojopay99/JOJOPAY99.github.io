<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-sm w-full bg-gray-800 p-8 rounded-3xl">
        <h2 class="text-2xl font-bold mb-6 text-center">會員登入</h2>
        <input type="text" id="l_id" placeholder="身分證" class="w-full p-4 mb-4 bg-gray-900 rounded-xl">
        <input type="password" id="l_ph" placeholder="手機(密碼)" class="w-full p-4 mb-6 bg-gray-900 rounded-xl">
        <button onclick="login()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">進入系統</button>
        <p class="text-center mt-4 text-sm"><a href="Register.html" class="underline">註冊新帳號</a></p>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        function login() {
            const id = document.getElementById('l_id').value.trim().toUpperCase();
            const ph = document.getElementById('l_ph').value.trim();
            db.ref('users/'+id).once('value', s => {
                const u = s.val();
                if(u && u.password === ph) { localStorage.setItem('uId', id); window.location.href="Member.html"; }
                else alert("帳號或密碼錯誤");
            });
        }
    </script>
</body>
