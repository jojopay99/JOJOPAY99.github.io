<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 專業金融服務</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>body { background: #0a0a0f; color: white; }</style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-indigo-400">JOJOPAY</h1>
        <div id="nav-btn">
            <button onclick="showLogin()" class="bg-gray-800 px-4 py-2 rounded-full text-sm">會員中心</button>
        </div>
    </nav>

    <main class="text-center py-20">
        <h2 class="text-5xl font-bold mb-10">JOJOPAY</h2>
        <section class="grid grid-cols-1 gap-4 p-8 text-center max-w-sm mx-auto">
            <div class="bg-gray-800 p-6 rounded-2xl">
                <div class="text-3xl font-bold">100%</div>
                <div class="text-sm text-gray-400">滿意度</div>
            </div>
        </section>
        <button onclick="showLogin()" class="mt-10 bg-indigo-600 px-12 py-4 rounded-full font-bold">立即取得資金 →</button>
    </main>

    <div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6">
        <div class="bg-[#151520] p-8 rounded-3xl w-full max-w-sm border border-gray-700">
            <h2 class="text-xl font-bold mb-6 text-center">會員登入</h2>
            <input type="text" id="l_id" placeholder="身分證字號" class="w-full p-4 mb-4 bg-black rounded-xl border border-gray-700">
            <input type="password" id="l_ph" placeholder="手機號碼(密碼)" class="w-full p-4 mb-6 bg-black rounded-xl border border-gray-700">
            <button onclick="login()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">立即登入</button>
            <div class="mt-4 flex justify-between text-sm text-gray-400">
                <a href="Register.html">註冊新會員</a>
                <button onclick="alert('請聯繫客服')">忘記密碼?</button>
            </div>
        </div>
    </div>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        const uId = localStorage.getItem('uId');
        
        // 檢查登入狀態更新導航
        if(uId) {
            db.ref('users/'+uId).once('value', s => {
                const u = s.val();
                if(u) document.getElementById('nav-btn').innerHTML = `<a href="Member.html" class="text-indigo-400">你好！${u.name}</a>`;
            });
        }

        function showLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
        function login() {
            const id = document.getElementById('l_id').value.trim().toUpperCase();
            const ph = document.getElementById('l_ph').value.trim();
            db.ref('users/'+id).once('value', s => {
                const u = s.val();
                if(u && u.password === ph) { localStorage.setItem('uId', id); window.location.href="Member.html"; }
                else alert("帳號密碼錯誤");
            });
        }
    </script>
</body>
</html>
