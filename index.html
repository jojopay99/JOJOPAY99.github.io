<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 專業金融</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>body { background: #0a0a0f; color: white; }</style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center border-b border-gray-800">
        <div class="w-20"></div> <h1 class="text-3xl font-bold text-indigo-400 text-center flex-1">JOJOPAY</h1>
        <div id="navRight">
            <a href="index.html" onclick="showLogin()" class="bg-gray-800 px-4 py-2 rounded-full text-sm">登入/註冊</a>
        </div>
    </nav>

    <main class="text-center py-20 px-6">
        <h2 class="text-4xl font-bold mb-6">資金需求？JOJOPAY 幫你搞定</h2>
        <button onclick="checkAccess()" class="bg-indigo-600 px-12 py-4 rounded-full font-bold text-lg">立即取得資金 →</button>
    </main>

    <section class="grid grid-cols-3 gap-4 p-8 border-t border-gray-800 text-center">
        <div><div class="text-2xl font-bold">10,000+</div><div class="text-xs text-gray-500">服務人次</div></div>
        <div><div class="text-2xl font-bold">100%</div><div class="text-xs text-gray-500">滿意度</div></div>
        <div><div class="text-2xl font-bold">24hr</div><div class="text-xs text-gray-500">快速撥款</div></div>
    </section>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        const uId = localStorage.getItem('uId');
        
        // 自動檢查登入狀態
        if(uId) {
            db.ref('users/'+uId).once('value', s => {
                const u = s.val();
                document.getElementById('navRight').innerHTML = `<a href="Member.html" class="text-indigo-400 font-bold">${u.name} 您好!</a>`;
            });
        }

        function checkAccess() {
            if(uId) window.location.href = "Member.html";
            else alert("請先登入");
        }
    </script>
</body>
</html>
