<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>body { background: #0a0a0f; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div id="loginBox" class="max-w-sm w-full bg-[#151520] p-8 rounded-3xl border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-center text-indigo-400">會員登入</h2>
        <input type="text" id="l_id" placeholder="身分證字號" class="w-full p-4 mb-4 bg-black rounded-xl border border-gray-700">
        <input type="password" id="l_ph" placeholder="手機號碼" class="w-full p-4 mb-6 bg-black rounded-xl border border-gray-700">
        <button onclick="login()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">登入</button>
        <div class="flex justify-between mt-6 text-sm text-gray-400">
            <a href="Register.html">會員註冊</a>
            <button onclick="fgt()">忘記密碼?</button>
        </div>
    </div>
    <div id="fgtBox" class="hidden max-w-sm w-full bg-[#151520] p-8 rounded-3xl text-center border border-gray-700">
        <p class="text-gray-300">連自己的手機號碼都會忘記嗎？請聯繫客服。</p>
        <button onclick="location.reload()" class="mt-6 w-full bg-gray-700 py-3 rounded-xl">返回</button>
    </div>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        function login() {
            const id = document.getElementById('l_id').value.trim().toUpperCase();
            const ph = document.getElementById('l_ph').value.trim();
            db.ref('users/'+id).once('value', s => {
                const u = s.val();
                if(u && u.password === ph) { localStorage.setItem('uId', id); window.location.href="Member.html"; }
                else alert("帳號密碼錯誤");
            });
        }
        function fgt() { document.getElementById('loginBox').style.display='none'; document.getElementById('fgtBox').style.display='block'; }
    </script>
</body>
</html>
