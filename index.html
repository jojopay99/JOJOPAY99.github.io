<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 會員登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-6">
    <div class="max-w-sm w-full bg-gray-800 rounded-3xl p-8 shadow-2xl border border-gray-700">
        <h2 class="text-2xl font-bold text-center text-indigo-400 mb-8">會員登入</h2>
        <div class="space-y-4">
            <input type="text" id="userId" placeholder="手機號碼" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl outline-none focus:border-indigo-500">
            <input type="password" id="userPw" placeholder="登入密碼" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl outline-none focus:border-indigo-500">
            <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold text-lg transition-all active:scale-95">登入</button>
            <p class="text-center text-sm text-gray-500 mt-4">還沒有帳號？<a href="Register.html" class="text-indigo-400 underline">立即註冊</a></p>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        function login() {
            const id = document.getElementById('userId').value.trim();
            const pw = document.getElementById('userPw').value.trim();

            if (!id || !pw) return alert("請輸入帳號與密碼");

            db.ref('users/' + id).once('value', (snapshot) => {
                const u = snapshot.val();
                if (u && u.password === pw) {
                    localStorage.setItem('userPhone', id);
                    // 不論狀態為何，一律轉導至會員中心，由 Member.html 處理狀態呈現
                    window.location.href = "Member.html";
                } else {
                    alert("帳號或密碼錯誤");
                }
            });
        }
    </script>
</body>
</html>
