<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>登入</title><script src="https://cdn.tailwindcss.com"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script></head>
<body class="bg-gray-900 text-white p-6"><div class="max-w-sm mx-auto space-y-4">
<input type="text" id="l_id" placeholder="身分證 (帳號)" class="w-full p-3 bg-gray-800 rounded">
<input type="password" id="l_ph" placeholder="手機號碼 (密碼)" class="w-full p-3 bg-gray-800 rounded">
<button onclick="login()" class="w-full bg-green-600 py-3 rounded">登入</button>
</div>
<script>
const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
function login() {
const id = document.getElementById('l_id').value.trim().toUpperCase();
const ph = document.getElementById('l_ph').value.trim();
db.ref('users/'+id).once('value', s => {
const u = s.val();
if(u && u.password === ph) { localStorage.setItem('uId', id); window.location.href="Member.html"; }
else { alert("帳密錯誤"); }
});
}
</script></body></html>
