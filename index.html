<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 專業金融服務</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>body { background: #0a0a0f; color: white; }</style>
</head>
<body>
    <nav class="p-6 flex justify-between items-center border-b border-gray-800">
        <div class="w-24"></div> 
        <h1 class="text-3xl font-bold text-indigo-400">JOJOPAY</h1>
        <a id="authBtn" href="javascript:void(0)" onclick="handleNav()" class="bg-indigo-600 px-5 py-2 rounded-full text-sm font-bold">會員中心</a>
    </nav>

    <main class="text-center py-20 px-6">
        <span class="bg-indigo-900 text-indigo-200 px-3 py-1 rounded-full text-xs">學生・年輕人首選</span>
        <h2 class="text-4xl font-bold mt-6 mb-4">資金需求？<br>JOJOPAY 幫你搞定</h2>
        <p class="text-gray-400 mb-10">簡單、快速、安全，線上申請 3 分鐘完成，最快當日撥款</p>
        
        <button id="mainBtn" onclick="mainAction()" class="bg-gray-800 px-12 py-4 rounded-full font-bold text-lg hover:bg-gray-700">立即申請 →</button>
    </main>

    <section class="grid grid-cols-3 gap-4 p-8 border-t border-gray-800 text-center">
        <div><div class="text-2xl font-bold">10,000+</div><div class="text-xs text-gray-500">服務人次</div></div>
        <div><div class="text-2xl font-bold">100%</div><div class="text-xs text-gray-500">滿意度</div></div>
        <div><div class="text-2xl font-bold">24hr</div><div class="text-xs text-gray-500">快速撥款</div></div>
    </section>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        const uId = localStorage.getItem('uId');
        const authBtn = document.getElementById('authBtn');
        const mainBtn = document.getElementById('mainBtn');

        // 初始化邏輯
        if(uId) {
            // 已登入狀態，檢查會員名稱並更新按鈕文字
            db.ref('users/'+uId).once('value', s => {
                if(s.val()) {
                    authBtn.innerText = s.val().name + " 您好";
                    mainBtn.innerText = "進入會員中心 →";
                }
            });
        }

        // 右上角按鈕功能
        function handleNav() {
            if(uId) {
                window.location.href = "Member.html";
            } else {
                window.location.href = "Login.html";
            }
        }

        // 大按鈕功能
        function mainAction() {
            if(uId) {
                window.location.href = "Member.html"; // 已登入則進入會員中心
            } else {
                window.location.href = "Register.html"; // 未登入則前往註冊
            }
        }
    </script>
</body>
</html>
