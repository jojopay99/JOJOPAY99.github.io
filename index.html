<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-gray-800 p-10 rounded-3xl border border-gray-700 shadow-2xl">
        <h2 class="text-3xl font-bold text-center mb-8 text-indigo-400">會員登入系統</h2>
        <input type="text" id="l_id" placeholder="身分證字號" class="w-full p-4 mb-4 bg-gray-900 rounded-xl border border-gray-700">
        <input type="password" id="l_ph" placeholder="手機號碼 (密碼)" class="w-full p-4 mb-8 bg-gray-900 rounded-xl border border-gray-700">
        <button onclick="login()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold text-lg hover:bg-indigo-500">登入系統</button>
        <div class="text-center mt-6">沒有帳號？ <a href="Register.html" class="text-indigo-400 underline">申請加入會員</a></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        function login() {
            const id = document.getElementById('l_id').value.trim().toUpperCase();
            const ph = document.getElementById('l_ph').value.trim();
            db.ref('users/'+id).once('value', s => {
                const u = s.val();
                if(u && u.password === ph) { localStorage.setItem('uId', id); window.location.href="Member.html"; }
                else alert("帳號或密碼錯誤");
            });
        }
    </script>
</body>
