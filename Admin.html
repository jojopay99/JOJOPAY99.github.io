<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 貸款流程管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0a14; color: white; font-family: sans-serif; }
        .stat-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: 0.3s; }
        .active-filter { border-color: #6366f1; background: rgba(99, 102, 241, 0.2) !important; box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
        .btn-action { font-size: 0.75rem; padding: 8px 12px; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .img-preview { width: 100px; height: 60px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .img-preview:hover { transform: scale(3.5); z-index: 50; position: relative; border-color: #6366f1; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginBox" class="max-w-sm mx-auto mt-32 p-8 bg-gray-800 rounded-3xl border border-gray-700 text-center shadow-2xl">
        <h2 class="text-2xl font-bold text-indigo-400 mb-6">JOJOPAY 管理登入</h2>
        <input type="password" id="admP" placeholder="管理密碼" class="w-full p-4 mb-6 bg-gray-900 border border-gray-600 rounded-xl text-center outline-none text-white focus:border-indigo-500">
        <button onclick="adminLogin()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition">進入系統</button>
    </div>

    <div id="adminPanel" class="hidden max-w-6xl mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-8">
            <div class="stat-card p-4 rounded-2xl text-center" onclick="filterList('pending_user')" id="btn-pending_user">
                <p class="text-pink-400 text-xs font-bold mb-1">資格待審</p>
                <h3 class="text-2xl font-black" id="c-puser">0</h3>
            </div>
            <div class="stat-card p-4 rounded-2xl text-center" onclick="filterList('official_user')" id="btn-official_user">
                <p class="text-green-400 text-xs font-bold mb-1">已過初審</p>
                <h3 class="text-2xl font-black" id="c-official">0</h3>
            </div>
            <div class="stat-card p-4 rounded-2xl text-center" onclick="filterList('pending_loan')" id="btn-pending_loan">
                <p class="text-yellow-400 text-xs font-bold mb-1">提現申請</p>
                <h3 class="text-2xl font-black" id="c-ploan">0</h3>
            </div>
            <div class="stat-card p-4 rounded-2xl text-center" onclick="filterList('active')" id="btn-active">
                <p class="text-indigo-400 text-xs font-bold mb-1">還款中</p>
                <h3 class="text-2xl font-black" id="c-active">0</h3>
            </div>
            <div class="stat-card p-4 rounded-2xl text-center" onclick="filterList('finished')" id="btn-finished">
                <p class="text-gray-400 text-xs font-bold mb-1">正常結案</p>
                <h3 class="text-2xl font-black" id="c-finished">0</h3>
            </div>
            <div class="stat-card p-4 rounded-2xl text-center" onclick="filterList('bad')" id="btn-bad">
                <p class="text-red-500 text-xs font-bold mb-1">呆帳黑名單</p>
                <h3 class="text-2xl font-black" id="c-bad">0</h3>
            </div>
        </div>

        <div id="userList" class="space-y-6"></div>
    </div>

    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let users = {};
        let currentFilter = 'pending_user';

        function adminLogin() {
            if(document.getElementById('admP').value === '0895') {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                init();
            } else { alert("密碼錯誤"); }
        }

        function init() {
            db.ref('users').on('value', snap => {
                users = snap.val() || {};
                updateCounts();
                filterList(currentFilter);
            });
        }

        function updateCounts() {
            let c = { 'pending_user':0, 'official_user':0, 'pending_loan':0, 'active':0, 'finished':0, 'bad':0 };
            for(let id in users) {
                const s = users[id].status || 'pending_user';
                if(c.hasOwnProperty(s)) c[s]++;
            }
            document.getElementById('c-puser').innerText = c['pending_user'];
            document.getElementById('c-official').innerText = c['official_user'];
            document.getElementById('c-ploan').innerText = c['pending_loan'];
            document.getElementById('c-active').innerText = c['active'];
            document.getElementById('c-finished').innerText = c['finished'];
            document.getElementById('c-bad').innerText = c['bad'];
        }

        function filterList(type) {
            currentFilter = type;
            const area = document.getElementById('userList');
            let html = '';
            document.querySelectorAll('.stat-card').forEach(el => el.classList.remove('active-filter'));
            if(document.getElementById('btn-' + type)) document.getElementById('btn-' + type).classList.add('active-filter');

            for(let id in users) {
                const u = users[id];
                const s = u.status || 'pending_user';
                if(s !== type) continue;

                html += `
                <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl overflow-hidden">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <div>
                            <p class="text-[10px] text-indigo-400 font-mono mb-1">手機號碼 (Key): ${id}</p>
                            <h2 class="text-2xl font-bold">${u.name || '未填'} <span class="text-sm font-normal text-gray-500 pl-2">身分證: ${u.idCard || '未填'}</span></h2>
                            <p class="text-indigo-400 text-lg font-black mt-1">核准額度: $${u.loanLimit || 0}</p>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${type === 'pending_user' ? `<button onclick="approveLimit('${id}')" class="btn-action bg-green-600 hover:bg-green-500">✅ 通過初審並設額度</button>` : ''}
                            ${type === 'official_user' ? `<button onclick="updateSt('${id}', 'pending_loan')" class="btn-action bg-yellow-600 text-black">📩 設為提現申請</button>` : ''}
                            ${type === 'pending_loan' ? `<button onclick="updateSt('${id}', 'active')" class="btn-action bg-indigo-600">💰 確認撥款(轉還款中)</button>` : ''}
                            <button onclick="del('${id}')" class="btn-action bg-gray-700 text-gray-400 hover:bg-red-900 hover:text-white">🗑️ 刪除</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4 border-t border-gray-700/50">
                        <div class="space-y-1 text-sm text-gray-400">
                            <p>🏦 銀行帳戶: <span class="text-white">${u.bank || '未提供'}</span></p>
                            <p>🏢 工作單位: <span class="text-white">${u.job || '未填'}</span> / 月薪: <span class="text-white">${u.salary || '0'}</span></p>
                            <p>📞 緊急聯絡: <span class="text-white">${u.contactName || '未填'} (${u.contactRel || ''}) - ${u.contactPhone || ''}</span></p>
                        </div>
                        <div class="md:col-span-2 flex flex-wrap gap-2">
                            ${u.img_f1 ? `<img src="${u.img_f1}" class="img-preview" title="正面">` : ''}
                            ${u.img_f2 ? `<img src="${u.img_f2}" class="img-preview" title="反面">` : ''}
                            ${u.img_f3 ? `<img src="${u.img_f3}" class="img-preview" title="存摺">` : ''}
                            ${u.img_f5 ? `<img src="${u.img_f5}" class="img-preview border-pink-500/50" title="自拍">` : ''}
                        </div>
                    </div>
                </div>`;
            }
            area.innerHTML = html || '<div class="text-center py-24 text-gray-600 tracking-widest">目前沒有符合此狀態的會員資料</div>';
        }

        function approveLimit(id) {
            const amt = prompt("請輸入此會員的「核准貸款額度」：", "30000");
            if (amt != null && amt !== "") {
                db.ref('users/'+id).update({ 
                    status: 'official_user',
                    loanLimit: parseInt(amt)
                }).then(() => alert("審核完成！額度已設定。"));
            }
        }

        function updateSt(id, s) { db.ref('users/'+id).update({ status: s }).then(() => alert("狀態已更新")); }
        function del(id) { if(confirm("確定要刪除這筆會員資料嗎？")) db.ref('users/'+id).remove(); }
    </script>
</body>
</html>
