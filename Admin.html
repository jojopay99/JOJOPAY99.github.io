<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0a0a0f; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .card { background: #151520; border: 1px solid #2d2d3a; border-radius: 20px; padding: 20px; transition: 0.3s; }
        .filter-btn { padding: 8px 16px; border-radius: 10px; background: #1e1e2e; cursor: pointer; border: 1px solid #333; }
        .filter-btn:hover { background: #4f46e5; }
    </style>
</head>
<body class="p-8">
    <div id="loginBox" class="max-w-xs mx-auto mt-20 p-8 card text-center">
        <h2 class="text-xl font-bold mb-6 text-indigo-400">管理員驗證</h2>
        <input type="password" id="admP" class="w-full p-3 mb-4 bg-black rounded-lg border border-gray-700 text-center" placeholder="密碼">
        <button onclick="checkAdmin()" class="w-full bg-indigo-600 py-3 rounded-lg font-bold hover:bg-indigo-500">進入系統</button>
    </div>

    <div id="adminPanel" class="hidden max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">會員審核中心</h1>
        <div class="flex gap-4 mb-8">
            <button onclick="filter('all')" class="filter-btn">全部</button>
            <button onclick="filter('pending_user')" class="filter-btn text-yellow-400">待審核</button>
            <button onclick="filter('official_user')" class="filter-btn text-green-400">已核准</button>
            <button onclick="filter('loan_active')" class="filter-btn text-blue-400">貸款中</button>
            <button onclick="filter('bad_debt')" class="filter-btn text-red-400">呆帳</button>
        </div>
        <div id="userList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        let allUsers = {};
        let currentFilter = 'all';

        function checkAdmin() {
            if(document.getElementById('admP').value === '0895') {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadData();
            } else { alert("權限不足"); }
        }

        function loadData() {
            db.ref('users').on('value', snap => {
                allUsers = snap.val() || {};
                render();
            });
        }

        function filter(status) { currentFilter = status; render(); }

        function render() {
            let html = '';
            for(let id in allUsers) {
                const u = allUsers[id];
                if(currentFilter !== 'all' && u.status !== currentFilter) continue;
                
                html += `
                <div class="card space-y-3">
                    <div class="flex justify-between">
                        <h2 class="font-bold text-white">${u.name}</h2>
                        <select onchange="updateStatus('${id}', this.value)" class="bg-gray-800 text-xs rounded p-1">
                            <option value="pending_user" ${u.status=='pending_user'?'selected':''}>待審核</option>
                            <option value="official_user" ${u.status=='official_user'?'selected':''}>已核准</option>
                            <option value="loan_active" ${u.status=='loan_active'?'selected':''}>貸款中</option>
                            <option value="bad_debt" ${u.status=='bad_debt'?'selected':''}>呆帳</option>
                        </select>
                    </div>
                    <div class="text-xs text-gray-400 space-y-1">
                        <p>帳號: ${id}</p>
                        <p>工作: ${u.job} | 薪資: ${u.salary}</p>
                        <p>聯絡: ${u.contact} | 地址: ${u.address}</p>
                        <p>銀行: ${u.bank}</p>
                    </div>
                    <div class="flex gap-2 py-2">
                        ${u.imgs ? Object.keys(u.imgs).map(k => `<img src="${u.imgs[k]}" class="w-16 h-12 rounded border border-gray-700 cursor-pointer" onclick="window.open('${u.imgs[k]}')">`).join('') : ''}
                    </div>
                    <button onclick="setLimit('${id}')" class="w-full bg-indigo-600 py-2 rounded-lg text-xs font-bold">設定額度: $${u.loanLimit || 0}</button>
                </div>`;
            }
            document.getElementById('userList').innerHTML = html;
        }

        function updateStatus(id, newStatus) { db.ref('users/'+id).update({status: newStatus}); }
        function setLimit(id) {
            const amt = prompt("輸入額度", "30000");
            if(amt) db.ref('users/'+id).update({loanLimit: parseInt(amt)});
        }
    </script>
</body>
</html>
