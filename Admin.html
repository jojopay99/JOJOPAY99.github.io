<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>後台管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div id="loginBox" class="max-w-xs mx-auto mt-20 p-8 bg-gray-800 rounded-xl">
        <input type="password" id="admP" placeholder="密碼" class="w-full p-2 bg-black rounded text-center">
        <button onclick="check()" class="w-full bg-blue-600 mt-4 p-2 rounded">登入</button>
    </div>
    <div id="adm" style="display:none;">
        <div id="stats" class="grid grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800 p-4 rounded text-center">待審: <span id="s_pending">0</span></div>
            <div class="bg-gray-800 p-4 rounded text-center">貸款: <span id="s_loan">0</span></div>
            <div class="bg-gray-800 p-4 rounded text-center">呆帳: <span id="s_bad">0</span></div>
            <div class="bg-gray-800 p-4 rounded text-center">總數: <span id="s_total">0</span></div>
        </div>
        <div id="list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        function check(){ if(document.getElementById('admP').value==='0895'){ document.getElementById('loginBox').style.display='none'; document.getElementById('adm').style.display='block'; load(); } }
        function load() {
            db.ref('users').on('value', s => {
                let html = '', pending=0, loan=0, bad=0, total=0;
                s.forEach(c => {
                    total++; const u = c.val();
                    if(u.status=='pending_user') pending++; else if(u.status=='loan_active') loan++; else if(u.status=='bad_debt') bad++;
                    html += `<div class="bg-gray-800 p-4 rounded">
                        <p class="font-bold">${u.name}</p>
                        <p class="text-xs">薪資:${u.salary} | 銀行:${u.bank}</p>
                        <div class="flex gap-1 my-2">${u.imgs ? Object.keys(u.imgs).map(k=>`<img src="${u.imgs[k]}" class="w-10 h-10 cursor-pointer" onclick="window.open('${u.imgs[k]}')">`).join('') : ''}</div>
                        <input type="number" value="${u.loanLimit}" onchange="db.ref('users/${c.key}').update({loanLimit:this.value})" class="w-full bg-black text-center mb-1">
                        <select onchange="db.ref('users/${c.key}').update({status:this.value})" class="w-full bg-black"><option value="pending_user" ${u.status=='pending_user'?'selected':''}>待審</option><option value="loan_active" ${u.status=='loan_active'?'selected':''}>貸款中</option><option value="bad_debt" ${u.status=='bad_debt'?'selected':''}>呆帳</option></select>
                    </div>`;
                });
                document.getElementById('list').innerHTML = html;
                document.getElementById('s_pending').innerText = pending;
                document.getElementById('s_loan').innerText = loan;
                document.getElementById('s_bad').innerText = bad;
                document.getElementById('s_total').innerText = total;
            });
        }
    </script>
</body>
</html>
