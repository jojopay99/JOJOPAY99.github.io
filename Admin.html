<body class="bg-gray-900 text-white p-6"><div id="list"></div>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
db.ref('users').on('value', s => {
const users = s.val() || {};
let html = '';
for(let id in users) {
html += `<div class="p-4 border-b border-gray-700">${id} - ${users[id].name} - $${users[id].loanLimit} 
<button onclick="app('${id}')" class="bg-blue-600 px-2 rounded">核准</button></div>`;
}
document.getElementById('list').innerHTML = html;
});
function app(id) {
const amt = prompt("輸入額度", "30000");
if(amt) db.ref('users/'+id).update({status: 'official_user', loanLimit: parseInt(amt)});
}
</script></body>
