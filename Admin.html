<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0a14; color: white; }
        .stat-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }
        .active-filter { border-color: #6366f1; background: rgba(99, 102, 241, 0.2) !important; }
        .btn-action { font-size: 0.75rem; padding: 6px 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body class="p-8">
    <div id="loginBox" class="max-w-sm mx-auto mt-32 p-8 bg-gray-800 rounded-2xl border border-gray-700 text-center">
        <h2 class="text-xl font-bold text-indigo-400 mb-6">後台管理登入</h2>
        <input type="password" id="admP" placeholder="管理密碼" class="w-full p-4 mb-6 bg-gray-900 border border-gray-600 rounded-xl text-center outline-none text-white">
        <button onclick="adminLogin()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">進入系統</button>
    </div>

    <div id="adminPanel" class="hidden max-w-6xl mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-6 gap-3 mb-10">
            <div class="stat-card p-4 rounded-xl text-center active-filter" onclick="filterList('pending_user')" id="btn-pending_user">
                <p class="text-pink-400 text-xs font-bold">資格待審</p>
                <h3 class="text-2xl font-black" id="c-puser">0</h3>
            </div>
            <div class="stat-card p-4 rounded-xl text-center" onclick="filterList('official_user')" id="btn-official_user">
                <p class="text-green-400 text-xs font-bold">已過審</p>
                <h3 class="text-2xl font-black" id="c-official">0</h3>
            </div>
            <div class="stat-card p-4 rounded-xl text-center" onclick="filterList('pending_loan')" id="btn-pending_loan">
                <p class="text-yellow-400 text-xs font-bold">貸款待審</p>
                <h3 class="text-2xl font-black" id="c-ploan">0</h3>
            </div>
            <div class="stat-card p-4 rounded-xl text-center" onclick="filterList('active')" id="btn-active">
                <p class="text-indigo-400 text-xs font-bold">線上會員</p>
                <h3 class="text-2xl font-black" id="c-active">0</h3>
            </div>
            <div class="stat-card p-4 rounded-xl text-center" onclick="filterList('finished')" id="btn-finished">
                <p class="text-gray-400 text-xs font-bold">正常下車</p>
                <h3 class="text-2xl font-black" id="c-finished">0</h3>
            </div>
            <div class="stat-card p-4 rounded-xl text-center" onclick="filterList('bad')" id="btn-bad">
                <p class="text-red-500 text-xs font-bold">呆帳名單</p>
                <h3 class="text-2xl font-black" id="c-bad">0</h3>
            </div>
        </div>
        <div id="userList" class="space-y-4"></div>
    </div>

    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let users = {};
        let currentFilter = 'pending_user';

        function adminLogin() {
            if(document.getElementById('admP').value === '0895') {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                init();
            } else { alert("密碼錯誤"); }
        }

        function init() {
            db.ref('users').on('value', snap => {
                users = snap.val() || {};
                updateCounts();
                filterList(currentFilter);
            });
        }

        function updateCounts() {
            let counts = { 'pending_user':0, 'official_user':0, 'pending_loan':0, 'active':0, 'finished':0, 'bad':0 };
            for(let id in users) {
                const s = users[id].status || 'pending_user'; // 舊會員預設待審
                if(counts.hasOwnProperty(s)) counts[s]++;
            }
            document.getElementById('c-puser').innerText = counts['pending_user'];
            document.getElementById('c-official').innerText = counts['official_user'];
            document.getElementById('c-ploan').innerText = counts['pending_loan'];
            document.getElementById('c-active').innerText = counts['active'];
            document.getElementById('c-finished').innerText = counts['finished'];
            document.getElementById('c-bad').innerText = counts['bad'];
        }

        function filterList(type) {
            currentFilter = type;
            const area = document.getElementById('userList');
            let html = '';
            document.querySelectorAll('.stat-card').forEach(el => el.classList.remove('active-filter'));
            document.getElementById('btn-' + type).classList.add('active-filter');

            for(let id in users) {
                const u = users[id];
                const s = u.status || 'pending_user';
                if(s !== type) continue;

                html += `
                <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex-1">
                        <p class="text-xl font-bold">${u.name || '無名氏'} <span class="text-xs text-gray-500 font-mono">(${id})</span></p>
                        <p class="text-sm text-gray-400 mt-1">ID: ${u.idCard || '未填'}</p>
                        <p class="text-sm text-gray-400">銀行: ${u.bank || '未填'}</p>
                    </div>
                    <div class="flex gap-2">
                        ${type === 'pending_user' ? `<button onclick="updateSt('${id}', 'official_user')" class="btn-action bg-green-600">通過資格</button>` : ''}
                        ${type === 'official_user' ? `<button onclick="updateSt('${id}', 'pending_loan')" class="btn-action bg-yellow-600">進入貸款審核</button>` : ''}
                        <button onclick="del('${id}')" class="btn-action bg-red-900">刪除</button>
                    </div>
                </div>`;
            }
            area.innerHTML = html || '<div class="text-center py-20 text-gray-600">目前沒有資料</div>';
        }

        function updateSt(id, s) { db.ref('users/'+id).update({ status: s }).then(() => alert("狀態更新成功")); }
        function del(id) { if(confirm("確定刪除？")) db.ref('users/'+id).remove(); }
    </script>
</body>
</html>
