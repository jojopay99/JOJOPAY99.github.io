<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 完整管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div id="loginBox" class="max-w-xs mx-auto mt-20 p-8 bg-gray-800 rounded-2xl">
        <input type="password" id="admP" placeholder="管理密碼" class="w-full p-3 mb-4 bg-black rounded-lg border border-gray-600 text-center">
        <button onclick="checkAdmin()" class="w-full bg-blue-600 py-3 rounded-lg font-bold">進入後台</button>
    </div>

    <div id="adminPanel" style="display:none;" class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">會員審核中心</h1>
        <div class="flex gap-4 mb-8">
            <button onclick="filter('all')" class="bg-gray-700 px-4 py-2 rounded">全部</button>
            <button onclick="filter('pending_user')" class="bg-yellow-800 px-4 py-2 rounded">待審核</button>
            <button onclick="filter('loan_active')" class="bg-blue-800 px-4 py-2 rounded">貸款中</button>
            <button onclick="filter('bad_debt')" class="bg-red-800 px-4 py-2 rounded">呆帳</button>
        </div>
        <div id="userList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        function checkAdmin() {
            if(document.getElementById('admP').value === '0895') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadData('all');
            } else { alert("密碼錯誤"); }
        }

        function loadData(status) {
            db.ref('users').on('value', snap => {
                const users = snap.val() || {};
                let html = '';
                for(let id in users) {
                    const u = users[id];
                    if(status !== 'all' && u.status !== status) continue;
                    html += `<div class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
                        <h2 class="text-xl font-bold mb-2">${u.name}</h2>
                        <p class="text-sm text-gray-400">工作: ${u.job} | 薪: ${u.salary}</p>
                        <p class="text-sm text-gray-400">銀行: ${u.bank}</p>
                        <div class="flex gap-2 my-4">
                            ${u.imgs ? Object.keys(u.imgs).map(k => `<img src="${u.imgs[k]}" class="w-16 h-12 rounded cursor-pointer" onclick="window.open('${u.imgs[k]}')">`).join('') : '無證件'}
                        </div>
                        <select onchange="updateStatus('${id}', this.value)" class="w-full bg-black p-2 rounded">
                            <option value="pending_user" ${u.status=='pending_user'?'selected':''}>待審核</option>
                            <option value="loan_active" ${u.status=='loan_active'?'selected':''}>貸款中</option>
                            <option value="bad_debt" ${u.status=='bad_debt'?'selected':''}>呆帳</option>
                        </select>
                    </div>`;
                }
                document.getElementById('userList').innerHTML = html;
            });
        }
        function updateStatus(id, status) { db.ref('users/'+id).update({status: status}); }
        function filter(s) { loadData(s); }
    </script>
</body>
</html>
