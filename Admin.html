<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 完整管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div id="loginBox" class="max-w-xs mx-auto mt-20 p-8 bg-gray-800 rounded-3xl border border-gray-700">
        <h2 class="text-xl font-bold mb-6 text-center">管理後台登入</h2>
        <input type="password" id="admP" placeholder="管理密碼" class="w-full p-3 mb-4 bg-black rounded-xl border border-gray-600 text-center text-white">
        <button onclick="checkAdmin()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">進入後台</button>
    </div>

    <div id="adminPanel" style="display:none;" class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">會員審核中心</h1>
        
        <div class="grid grid-cols-4 gap-4 mb-8 text-center">
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700"><p class="text-gray-400">待審核</p><h2 id="s_pending" class="text-2xl font-bold text-yellow-400">0</h2></div>
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700"><p class="text-gray-400">貸款中</p><h2 id="s_loan" class="text-2xl font-bold text-blue-400">0</h2></div>
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700"><p class="text-gray-400">呆帳</p><h2 id="s_bad" class="text-2xl font-bold text-red-400">0</h2></div>
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700"><p class="text-gray-400">總會員</p><h2 id="s_total" class="text-2xl font-bold text-white">0</h2></div>
        </div>

        <div id="userList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        
        function checkAdmin() {
            if(document.getElementById('admP').value === '0895') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadData();
            } else { alert("密碼錯誤"); }
        }

        function loadData() {
            db.ref('users').on('value', snap => {
                const users = snap.val() || {};
                let html = '', s1=0, s2=0, s3=0, s4=0;
                
                for(let id in users) {
                    const u = users[id];
                    s4++;
                    if(u.status=='pending_user') s1++;
                    else if(u.status=='loan_active') s2++;
                    else if(u.status=='bad_debt') s3++;

                    html += `
                    <div class="bg-gray-800 p-6 rounded-3xl border border-gray-700 shadow-xl">
                        <h2 class="text-xl font-bold mb-2">${u.name}</h2>
                        <div class="text-sm text-gray-400 space-y-2 mb-4">
                            <p>身分證: ${id}</p>
                            <div class="flex items-center gap-2">
                                <span>手機:</span>
                                <input type="text" id="ph_${id}" value="${u.password || ''}" disabled class="bg-black p-1 rounded border border-gray-600 text-white w-full">
                                <button onclick="toggleEdit('${id}')" class="text-blue-400 text-xs">編輯</button>
                            </div>
                            <p>工作: ${u.job} | 薪資: ${u.salary}</p>
                            <p>銀行: ${u.bank}</p>
                            <p>聯絡人: ${u.contacts ? u.contacts.map(c => c.name).join(', ') : '無'}</p>
                        </div>
                        
                        <div class="flex gap-2 my-4 overflow-x-auto">
                            ${u.imgs ? Object.keys(u.imgs).map(k => `<img src="${u.imgs[k]}" class="w-16 h-16 rounded-lg cursor-pointer border border-gray-600" onclick="window.open('${u.imgs[k]}')">`).join('') : '無證件'}
                        </div>

                        <div class="mt-4 p-3 bg-black rounded-xl border border-gray-700">
                            <label class="text-xs text-gray-500">貸款額度</label>
                            <input type="number" value="${u.loanAmount || 0}" onchange="updateVal('${id}', 'loanAmount', this.value)" class="w-full bg-transparent text-white font-bold mb-2">
                            <label class="text-xs text-gray-500">還款次數</label>
                            <input type="number" value="${u.payCount || 0}" onchange="updateVal('${id}', 'payCount', this.value)" class="w-full bg-transparent text-white font-bold">
                        </div>

                        <select onchange="updateVal('${id}', 'status', this.value)" class="w-full mt-4 p-3 bg-indigo-900 rounded-xl font-bold">
                            <option value="pending_user" ${u.status=='pending_user'?'selected':''}>待審核</option>
                            <option value="loan_active" ${u.status=='loan_active'?'selected':''}>貸款中</option>
                            <option value="bad_debt" ${u.status=='bad_debt'?'selected':''}>呆帳</option>
                        </select>
                        
                        <button onclick="deleteUser('${id}')" class="w-full mt-2 py-2 bg-red-900 hover:bg-red-800 rounded-xl text-xs font-bold text-red-200">刪除此會員</button>
                    </div>`;
                }
                document.getElementById('userList').innerHTML = html;
                document.getElementById('s_pending').innerText = s1;
                document.getElementById('s_loan').innerText = s2;
                document.getElementById('s_bad').innerText = s3;
                document.getElementById('s_total').innerText = s4;
            });
        }

        function toggleEdit(id) {
            const input = document.getElementById('ph_' + id);
            if(input.disabled) {
                input.disabled = false;
                input.focus();
            } else {
                input.disabled = true;
                updateVal(id, 'password', input.value);
            }
        }

        function updateVal(id, field, val) { 
            let updateObj = {}; 
            updateObj[field] = val; 
            db.ref('users/'+id).update(updateObj); 
        }

        function deleteUser(id) {
            if(confirm("確定要刪除會員 " + id + " 嗎？")) {
                db.ref('users/'+id).remove();
            }
        }
    </script>
</body>
</html>
