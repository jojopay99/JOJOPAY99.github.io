<body class="bg-[#0a0a0f] text-white p-8">
    <div id="login" class="max-w-xs mx-auto mt-20 p-8 bg-[#151520] rounded-3xl text-center">
        <input type="password" id="p" placeholder="管理密碼" class="w-full p-3 mb-4 bg-black rounded border border-gray-700 text-center">
        <button onclick="if(document.getElementById('p').value==='0895'){document.getElementById('login').classList.add('hidden');document.getElementById('adm').classList.remove('hidden');load();}" class="bg-indigo-600 w-full py-2 rounded">進入</button>
    </div>
    <div id="adm" class="hidden max-w-7xl mx-auto">
        <div class="flex gap-4 mb-8">
            <button onclick="filt('all')" class="bg-gray-800 px-4 py-2 rounded">全部</button>
            <button onclick="filt('pending_user')" class="bg-yellow-900 px-4 py-2 rounded">待審</button>
            <button onclick="filt('official_user')" class="bg-green-900 px-4 py-2 rounded">核准</button>
        </div>
        <div id="list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        let users = {}; let f = 'all';
        function load() { db.ref('users').on('value', s => { users = s.val() || {}; render(); }); }
        function filt(s) { f = s; render(); }
        function render() {
            let html = '';
            for(let id in users) {
                if(f !== 'all' && users[id].status !== f) continue;
                html += `<div class="bg-[#151520] p-6 rounded-3xl border border-gray-700">
                    <h2 class="font-bold">${users[id].name} (${id})</h2>
                    <p class="text-sm text-gray-400">手機: ${users[id].phone} | 工作: ${users[id].job} | 薪: ${users[id].salary}</p>
                    <div class="flex gap-2 mt-4">${users[id].imgs ? Object.keys(users[id].imgs).map(k=>`<img src="${users[id].imgs[k]}" class="w-16 h-12 rounded">`).join('') : ''}</div>
                    <button onclick="db.ref('users/${id}').update({status:'official_user', loanLimit:30000})" class="w-full mt-4 bg-indigo-600 py-2 rounded">核准</button>
                </div>`;
            }
            document.getElementById('list').innerHTML = html;
        }
    </script>
</body>
