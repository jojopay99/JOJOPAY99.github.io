<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 完整管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div id="loginBox" class="max-w-xs mx-auto mt-20 p-8 bg-gray-800 rounded-3xl border border-gray-700">
        <h2 class="text-xl font-bold mb-6 text-center">管理後台登入</h2>
        <input type="password" id="admP" placeholder="管理密碼" class="w-full p-3 mb-4 bg-black rounded-xl border border-gray-600 text-center text-white">
        <button onclick="checkAdmin()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">進入後台</button>
    </div>

    <div id="adminPanel" style="display:none;" class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">JOJOPAY 管理系統</h1>
        
        <div class="flex flex-wrap gap-4 mb-8 text-center text-sm justify-center">
    <div onclick="setView('pending_user')" class="bg-gray-800 p-4 rounded-2xl border border-yellow-600 cursor-pointer hover:bg-gray-700 w-32">
        <p class="text-gray-400">會員申請</p><h2 id="s_pending" class="text-xl font-bold">0</h2>
    </div>
    <div onclick="setView('verified')" class="bg-gray-800 p-4 rounded-2xl border border-green-600 cursor-pointer hover:bg-gray-700 w-32">
        <p class="text-gray-400">正式會員</p><h2 id="s_verified" class="text-xl font-bold">0</h2>
    </div>
    <div onclick="setView('applying_loan')" class="bg-gray-800 p-4 rounded-2xl border border-indigo-600 cursor-pointer hover:bg-gray-700 w-32">
        <p class="text-gray-400">貸款申請</p><h2 id="s_appLoan" class="text-xl font-bold">0</h2>
    </div>
    <div onclick="setView('loaning')" class="bg-gray-800 p-4 rounded-2xl border border-blue-600 cursor-pointer hover:bg-gray-700 w-32">
        <p class="text-gray-400">已貸款</p><h2 id="s_loaning" class="text-xl font-bold">0</h2>
    </div>
    <div onclick="setView('paid')" class="bg-gray-800 p-4 rounded-2xl border border-gray-600 cursor-pointer hover:bg-gray-700 w-32">
        <p class="text-gray-400">已還款</p><h2 id="s_paid" class="text-xl font-bold">0</h2>
    </div>
    <div onclick="setView('bad_debt')" class="bg-gray-800 p-4 rounded-2xl border border-red-600 cursor-pointer hover:bg-gray-700 w-32">
        <p class="text-gray-400">未正常還款</p><h2 id="s_bad" class="text-xl font-bold">0</h2>
    </div>
    <div class="bg-gray-800 p-4 rounded-2xl border border-gray-500 w-32">
        <p class="text-gray-400">總會員</p><h2 id="s_total" class="text-xl font-bold">0</h2>
    </div>
        </div>
<div class="mb-6">
    <input type="text" id="searchInput" onkeyup="filterUsers()" 
           placeholder="搜尋姓名或身分證 ID..." 
           class="w-full max-w-md p-3 bg-gray-800 border border-gray-600 rounded-xl text-white">
</div>
        <h2 id="currentTitle" class="text-xl font-bold mb-4 text-indigo-400">請選擇上方分類查看名單</h2>
<div id="userList" class="flex flex-wrap gap-6 justify-start"></div>
    </div>

    <script>
      const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
let currentView = '';

function checkAdmin() {
    if(document.getElementById('admP').value === '0895') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadData();
    } else { alert("密碼錯誤"); }
}

function setView(v) { currentView = v; loadData(); }

function loadData() {
    db.ref('users').on('value', snap => {
        const users = snap.val() || {};
        let html = '', stats = { pending_user:0, verified:0, applying_loan:0, loaning:0, paid:0, bad_debt:0, total:0 };
        for(let id in users) {
            const u = users[id];
            stats.total++;
            if(stats[u.status] !== undefined) stats[u.status]++;
            if(u.status === currentView) html += renderUserCard(id, u);
        }
        document.getElementById('userList').innerHTML = html || '<p class="text-gray-500">此分類目前無資料</p>';
        // 更新上方狀態數字
        ['pending', 'verified', 'appLoan', 'loaning', 'paid', 'bad', 'total'].forEach(k => {
            const el = document.getElementById('s_'+k);
            if(el) el.innerText = stats[k === 'appLoan' ? 'applying_loan' : (k === 'bad' ? 'bad_debt' : k)];
        });
    });
}

function renderUserCard(id, u) {
    let actionHtml = '';
    // 狀態分流邏輯
    if(u.status === 'pending_user') {
        actionHtml = `<button onclick="updateVal('${id}', 'status', 'verified')" class="w-full bg-green-600 py-2 rounded-xl font-bold">核准為正式會員</button>`;
    } else if(u.status === 'verified') {
        actionHtml = `<div class="p-3 bg-black rounded-xl border border-gray-700 mb-2 text-xs">
            <p class="text-gray-400 mb-1">設定建議額度</p>
            <input type="number" id="limit_${id}" value="${u.loanAmount || 5000}" class="w-full bg-gray-800 p-2 rounded">
            <button onclick="updateVal('${id}', 'loanAmount', document.getElementById('limit_${id}').value)" class="mt-2 w-full bg-indigo-600 py-1 rounded">儲存額度</button>
        </div>`;
    } else if(u.status === 'applying_loan' || u.status === 'loaning') {
        actionHtml = `<div class="p-3 bg-indigo-900/30 rounded-xl border border-indigo-500 space-y-2">
            <div class="grid grid-cols-2 gap-2 text-xs">
                <input type="number" id="amt_${id}" value="${u.loanAmount || 5000}" placeholder="貸款金額" class="bg-black p-1 rounded">
                <input type="number" id="days_${id}" value="${u.loanDays || ''}" placeholder="天數" class="bg-black p-1 rounded">
                <input type="number" id="deduct_${id}" value="${u.deduct || 0}" placeholder="扣除金額" class="bg-black p-1 rounded col-span-2">
            </div>
            <button onclick="approveLoan('${id}')" class="w-full bg-blue-600 py-2 rounded-lg text-sm font-bold">撥款/更新設定</button>
        </div>`;
    } else if(u.status === 'paid') {
        actionHtml = `<button onclick="updateVal('${id}', 'status', 'applying_loan')" class="w-full bg-blue-600 py-2 rounded-xl font-bold mb-2">重新發起貸款</button>`;
    }

    // 處理呆帳按鈕顯示：僅在 bad_debt 狀態顯示
    let badDebtHtml = (u.status === 'bad_debt') ? `
        <div class="mt-4 p-3 bg-red-900/20 border border-red-600 rounded-xl">
            <input type="number" id="badAmt_${id}" placeholder="處理金額" class="w-full bg-black p-2 rounded mb-2">
            <button onclick="processBadDebt('${id}')" class="w-full bg-red-600 py-2 rounded font-bold text-xs">標記/處理呆帳</button>
        </div>` : '';

    // 歷史紀錄按鈕
    let historyHtml = '';
    if (u.history) {
        historyHtml = `<div class="mt-4 pt-2 border-t border-gray-700 text-[10px] text-gray-400">
            <p class="mb-1 text-gray-500">歷史紀錄：</p>
            <div class="flex flex-wrap gap-2">`;
        Object.keys(u.history).forEach(k => {
            historyHtml += `<button data-id="${id}" data-hid="${k}" class="history-btn bg-gray-700 hover:bg-indigo-500 px-2 py-1 rounded text-indigo-300 transition-colors">${k}</button>`;
        });
        historyHtml += `</div></div>`;
    }

    return `<div class="bg-gray-800 p-6 rounded-3xl border border-gray-700 w-full md:w-80">
        <h2 class="text-xl font-bold mb-4">${u.name}</h2>
        <div class="text-xs text-gray-400 space-y-1 mb-4">
            <p>身分證: ${id}</p>
            <p>手機: ${u.password}</p>
            ${u.balance !== undefined ? `<p class="text-green-400 font-bold">剩餘: ${u.balance}</p>` : ''}
        </div>
        ${actionHtml}
        ${badDebtHtml}
        ${historyHtml}
        <button onclick="deleteUser('${id}')" class="w-full mt-4 text-xs text-red-500 opacity-50">刪除會員</button>
    </div>`;
}

function confirmPayment(uId, logId, amount) {
    db.ref('users/' + uId).transaction(function(u) {
        if (!u) return u;
        u.balance -= amount;
        if (u.balance <= 0) {
            u.status = 'paid';
            if (!u.history) u.history = {};
            u.history[new Date().getTime()] = { loanAmount: u.loanAmount, loanDate: u.loanDate, paidDate: new Date().toLocaleString() };
            u.balance = 0;
            u.currentDue = 0;
        }
        return u;
    }, (e, c) => { if (c) alert("入帳確認成功！"); });
}

function approveLoan(id) {
    const amt = parseInt(document.getElementById('amt_'+id).value);
    db.ref('users/'+id).update({ status: 'loaning', loanAmount: amt, balance: amt, loanDate: new Date().toLocaleDateString() });
}

function processBadDebt(id) {
    db.ref('users/' + id).update({ status: 'bad_debt', balance: 0, currentDue: 0 });
}

// 監聽器與其他功能
document.addEventListener('click', (e) => {
    if (e.target.classList.contains('history-btn')) viewHistory(e.target.dataset.id, e.target.dataset.hid);
});

function viewHistory(uId, hId) {
    db.ref(`users/${uId}/history/${hId}`).once('value', s => {
        const h = s.val();
        document.getElementById('modalContent').innerHTML = h ? `<p>金額: ${h.loanAmount}</p><p>日期: ${h.loanDate}</p>` : "無資料";
        document.getElementById('historyModal').classList.remove('hidden');
    });
}
</script>
    <div id="historyModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
    <div class="bg-gray-800 p-6 rounded-3xl border border-gray-600 max-w-sm w-full mx-4">
        <h3 class="text-xl font-bold mb-4 text-indigo-400">歷史紀錄詳情</h3>
        <div id="modalContent" class="text-sm text-gray-300 space-y-2 mb-6"></div>
        <button onclick="document.getElementById('historyModal').classList.add('hidden')" 
                class="w-full bg-gray-600 py-2 rounded-xl font-bold">關閉</button>
    </div>
</div>
</body>
</html>
