<body class="bg-gray-950 text-white p-8">
    <h1 class="text-3xl font-bold mb-8">管理後台</h1>
    <div id="list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        db.ref('users').on('value', s => {
            const users = s.val() || {};
            let html = '';
            for(let id in users) {
                const u = users[id];
                html += `
                <div class="bg-gray-900 p-6 rounded-3xl border border-gray-700">
                    <h2 class="text-xl font-bold">${u.name}</h2>
                    <p class="text-sm text-gray-400">ID: ${id} | 手機: ${u.phone} | 薪: ${u.salary} | 工作: ${u.job}</p>
                    <div class="flex gap-2 mt-4">${u.imgs ? Object.keys(u.imgs).map(k=>`<img src="${u.imgs[k]}" class="w-16 h-12 rounded">`).join('') : ''}</div>
                    <button onclick="app('${id}')" class="w-full mt-4 bg-indigo-600 py-2 rounded-xl font-bold">通過審核並設定額度</button>
                </div>`;
            }
            document.getElementById('list').innerHTML = html;
        });
        function app(id) {
            const amt = prompt("設定額度", "30000");
            if(amt) db.ref('users/'+id).update({status: 'official_user', loanLimit: parseInt(amt)});
        }
    </script>
</body>
