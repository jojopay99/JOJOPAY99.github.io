<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 後台管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-indigo-400">會員完整審核清單</h1>
        <div id="userList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        
        db.ref('users').on('value', s => {
            const users = s.val() || {};
            let html = '';
            for(let id in users) {
                const u = users[id];
                html += `
                <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-xl font-bold">${u.name}</h2>
                        <span class="px-3 py-1 rounded-full text-xs ${u.status === 'official_user' ? 'bg-green-900 text-green-300' : 'bg-yellow-900 text-yellow-300'}">${u.status}</span>
                    </div>
                    <div class="space-y-2 text-sm text-gray-300">
                        <p><strong>帳號(身分證):</strong> ${id}</p>
                        <p><strong>手機(密碼):</strong> ${u.phone}</p>
                        <p><strong>居住地址:</strong> ${u.address}</p>
                        <p><strong>工作單位:</strong> ${u.job}</p>
                        <p><strong>月薪:</strong> ${u.salary}</p>
                        <p><strong>緊急聯絡人:</strong> ${u.contact}</p>
                        <p><strong>撥款帳號:</strong> ${u.bank}</p>
                    </div>
                    <div class="mt-4 flex gap-2">
                        ${u.imgs ? Object.keys(u.imgs).map(k => `<img src="${u.imgs[k]}" class="w-16 h-12 object-cover rounded border border-gray-600" title="${k}">`).join('') : '無上傳圖片'}
                    </div>
                    <div class="mt-6">
                        <button onclick="approve('${id}')" class="w-full bg-indigo-600 py-2 rounded-xl font-bold hover:bg-indigo-500">核准並設定額度</button>
                    </div>
                </div>`;
            }
            document.getElementById('userList').innerHTML = html;
        });

        function approve(id) {
            const amt = prompt("請輸入核准額度", "30000");
            if(amt) {
                db.ref('users/'+id).update({ status: 'official_user', loanLimit: parseInt(amt) })
                .then(() => alert("已更新會員狀態"));
            }
        }
    </script>
</body>
</html>
