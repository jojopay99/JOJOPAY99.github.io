<body class="bg-gray-950 text-white p-8">
    <div id="adminPanel" class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-indigo-400">會員詳細審核管理</h1>
        <div id="userList" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        db.ref('users').on('value', s => {
            const users = s.val() || {};
            let html = '';
            for(let id in users) {
                const u = users[id];
                html += `
                <div class="bg-gray-900 p-6 rounded-3xl border border-gray-700">
                    <h2 class="text-xl font-bold">${u.name}</h2>
                    <p class="text-sm text-gray-400 mt-2">帳號: ${id} | 手機: ${u.phone} | 單位: ${u.job} | 薪資: ${u.salary}</p>
                    <div class="flex gap-2 mt-4">
                        ${u.imgs ? Object.keys(u.imgs).map(k => `<img src="${u.imgs[k]}" class="w-16 h-12 object-cover rounded">`).join('') : ''}
                    </div>
                    <button onclick="approve('${id}')" class="w-full mt-4 bg-indigo-600 py-2 rounded-xl">通過審核 (設定額度)</button>
                </div>`;
            }
            document.getElementById('userList').innerHTML = html;
        });
        function approve(id) {
            const amt = prompt("輸入額度", "30000");
            if(amt) db.ref('users/'+id).update({status: 'official_user', loanLimit: parseInt(amt)});
        }
    </script>
</body>
