<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div id="loginBox" class="max-w-sm mx-auto mt-20 p-8 bg-gray-800 rounded-2xl">
        <input type="password" id="admP" placeholder="管理密碼" class="w-full p-4 bg-gray-900 mb-4 rounded-xl text-center">
        <button onclick="adminLogin()" class="w-full bg-indigo-600 py-3 rounded-xl">登入</button>
    </div>

    <div id="adminPanel" class="hidden max-w-5xl mx-auto">
        <h2 class="text-xl font-bold mb-6">審核管理區</h2>
        <div class="grid grid-cols-1 gap-6" id="userList"></div>
    </div>

    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        function adminLogin() {
            if(document.getElementById('admP').value === '0895') {
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadData();
            }
        }

        function loadData() {
            db.ref('users').on('value', (snap) => {
                const users = snap.val();
                let html = '';
                for(let id in users) {
                    const u = users[id];
                    let actionBtn = '';

                    // 1. 判斷顯示邏輯
                    if(u.status === 'pending_user') {
                        actionBtn = `<button onclick="up('${id}', 'official_user')" class="bg-green-600 px-4 py-2 rounded">審核會員通過</button>`;
                    } else if(u.status === 'pending_loan') {
                        actionBtn = `<button onclick="up('${id}', 'active')" class="bg-blue-600 px-4 py-2 rounded">核准撥款(線上)</button>`;
                    } else if(u.status === 'active') {
                        actionBtn = `
                            <button onclick="up('${id}', 'finished')" class="bg-green-500 px-2 py-1 rounded">正常下車</button>
                            <button onclick="up('${id}', 'bad')" class="bg-red-600 px-2 py-1 rounded">呆帳</button>
                            <button onclick="del('${id}')" class="bg-gray-600 px-2 py-1 rounded">刪除</button>`;
                    }

                    html += `<div class="bg-gray-800 p-4 rounded-xl flex justify-between items-center border border-gray-700">
                        <div>
                            <p class="font-bold">${u.name} <span class="text-xs text-gray-500">(${u.status})</span></p>
                            <p class="text-sm">申請金額: $${u.loanLimit || 0}</p>
                        </div>
                        <div class="space-x-2">${actionBtn}</div>
                    </div>`;
                }
                document.getElementById('userList').innerHTML = html;
            });
        }

        function up(id, s) { db.ref('users/'+id).update({status: s}); }
        function del(id) { db.ref('users/'+id).remove(); }
    </script>
</body>
</html>
