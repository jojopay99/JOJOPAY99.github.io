<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>會員中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0a0a0f] text-white p-8">
    <div id="ui" class="max-w-md mx-auto bg-[#151520] p-8 rounded-3xl text-center border border-gray-700">
        <h2 class="text-2xl font-bold mb-4">載入中...</h2>
    </div>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        const id = localStorage.getItem('uId');
        db.ref('users/'+id).on('value', s => {
            const u = s.val();
            document.getElementById('ui').innerHTML = `
                <h1 class="text-3xl font-bold">${u.name}</h1>
                <p class="text-gray-400 mt-2">狀態: ${u.status == 'loan_active' ? '貸款中' : '審核中'}</p>
                <div class="my-8 p-6 bg-black rounded-2xl">
                    <p class="text-sm">當前可貸額度</p>
                    <p class="text-4xl font-bold text-green-400">$${u.loanLimit || 0}</p>
                </div>
                ${u.status == 'loan_active' ? `<button class="w-full bg-blue-600 py-3 rounded">申請撥款</button>` : `<p class="text-yellow-500">等待審核中，請稍候</p>`}
            `;
        });
    </script>
</body>
</html>
