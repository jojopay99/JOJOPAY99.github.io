<body class="bg-[#0a0a0f] text-white p-6">
    <div id="ui" class="max-w-md mx-auto bg-[#151520] p-8 rounded-3xl mt-10">讀取中...</div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        db.ref('users/'+localStorage.getItem('uId')).on('value', s => {
            const u = s.val();
            document.getElementById('ui').innerHTML = `<h1 class="text-2xl">${u.name}</h1><p>狀態: ${u.status}</p><p class="text-2xl mt-4">額度: $${u.loanLimit}</p>`;
        });
    </script>
</body>
