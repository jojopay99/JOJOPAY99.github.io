<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>會員中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-md mx-auto bg-gray-800 p-8 rounded-3xl">
        <h1 class="text-2xl font-bold mb-4">會員中心</h1>
        <p id="statusText" class="mb-4"></p>
        <div id="loanDetail" class="hidden">剩餘金額: <span id="remAmount"></span></div>
        <div id="actionArea" class="hidden mt-4 bg-indigo-600 p-3 rounded text-center">立即申請貸款</div>
    </div>
    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        const userPhone = localStorage.getItem('userPhone');

        if(!userPhone) window.location.href = "index.html";

        db.ref('users/' + userPhone).on('value', (snap) => {
            const u = snap.val();
            if(!u) return;
            const stText = document.getElementById('statusText');
            const action = document.getElementById('actionArea');
            const detail = document.getElementById('loanDetail');

            if (u.status === 'pending_user') stText.innerText = "審核中...";
            else if (u.status === 'official_user') { stText.innerText = "正式會員：可申請額度 " + u.loanLimit; action.classList.remove('hidden'); }
            // 這裡對接了後台設定的 status 與 loanLimit
        });
    </script>
</body>
</html>
