<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>會員中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>body { background: #0a0a0f; color: white; }</style>
</head>
<body class="p-8">
    <div class="max-w-md mx-auto bg-[#151520] p-8 rounded-3xl border border-gray-700 text-center">
        <h1 id="userName" class="text-2xl font-bold mb-4">讀取中...</h1>
        <div id="statusUI" class="space-y-4">
            <p>目前狀態: <span id="uStatus" class="text-yellow-400">讀取中</span></p>
            <div class="text-5xl font-bold text-green-400 my-6">$ <span id="uLimit">0</span></div>
            <button onclick="applyLoan()" class="w-full bg-indigo-600 py-3 rounded-xl">申請貸款/更新合約</button>
        </div>
    </div>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        const uId = localStorage.getItem('uId');
        db.ref('users/'+uId).on('value', s => {
            const u = s.val();
            document.getElementById('userName').innerText = u.name + " 您好";
            document.getElementById('uStatus').innerText = u.status == 'loan_active' ? '貸款中' : (u.status == 'bad_debt' ? '呆帳' : '待審核');
            document.getElementById('uLimit').innerText = u.loanAmount || 0;
        });
        function applyLoan() { alert("系統將跳轉至簽名介面..."); }
    </script>
</body>
</html>
