<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJOPAY | 會員中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0a0a14] text-white p-6">
    <div id="app" class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-indigo-400">JOJOPAY 會員中心</h1>
            <button onclick="location.href='index.html'" class="text-sm text-gray-500">登出</button>
        </div>

        <div id="statusBox" class="bg-gray-800 rounded-3xl p-8 border border-gray-700 text-center shadow-xl">
            <p class="text-gray-400 mb-2">當前帳戶狀態</p>
            <div id="statusText" class="text-xl font-bold mb-6 italic italic">讀取中...</div>
            
            <div id="actionArea" class="hidden">
                <button onclick="applyLoan()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-500/20">立即申請貸款</button>
            </div>

            <div id="loanDetail" class="hidden space-y-4 text-left">
                <div class="bg-black/30 p-4 rounded-xl border border-indigo-500/20">
                    <p class="text-xs text-gray-500">剩餘未繳</p>
                    <p class="text-2xl font-black text-pink-500" id="remAmount">$0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        const userPhone = localStorage.getItem('userPhone');

        if(!userPhone) location.href = 'index.html';

        db.ref('users/' + userPhone).on('value', (snapshot) => {
            const u = snapshot.val();
            const st = document.getElementById('statusText');
            const action = document.getElementById('actionArea');
            const detail = document.getElementById('loanDetail');

            if(u.status === 'pending_user') {
                st.innerText = "會員資格審核中...";
                st.className = "text-xl font-bold text-pink-500 italic";
            } else if(u.status === 'official_user') {
                st.innerText = "正式會員 (尚未借款)";
                st.className = "text-xl font-bold text-green-400";
                action.classList.remove('hidden');
            } else if(u.status === 'pending_loan') {
                st.innerText = "貸款申請審核中...";
                st.className = "text-xl font-bold text-indigo-400 animate-pulse";
                action.classList.add('hidden');
            } else if(u.status === 'active') {
                st.innerText = "線上會員 (借款中)";
                st.className = "text-xl font-bold text-indigo-400";
                action.classList.add('hidden');
                detail.classList.remove('hidden');
                document.getElementById('remAmount').innerText = '$' + (u.remainingAmount || 0);
            } else if(u.status === 'finished') {
                st.innerText = "信用良好 (已結清)";
                st.className = "text-xl font-bold text-green-500";
                action.classList.remove('hidden');
            } else if(u.status === 'bad') {
                st.innerText = "帳戶已被停用 (呆帳)";
                st.className = "text-xl font-bold text-red-600";
            }
        });

        function applyLoan() {
            const amt = prompt("請輸入您想申請的貸款金額：", "50000");
            if(amt) {
                db.ref('users/' + userPhone).update({
                    status: 'pending_loan',
                    loanLimit: amt
                }).then(() => alert("貸款申請已送出！"));
            }
        }
    </script>
</body>
</html>
