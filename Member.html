<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 會員中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-8" id="welcomeMsg">會員中心</h1>
        
        <div id="content" class="bg-gray-800 p-8 rounded-3xl border border-gray-700 text-center">
            <div id="uiStatus">載入中...</div>
        </div>
        <button onclick="localStorage.clear(); location.href='index.html';" class="w-full mt-8 text-gray-500 text-sm">登出</button>
    </div>

    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        const userPhone = localStorage.getItem('userPhone');

        db.ref('users/' + userPhone).on('value', (snap) => {
            const u = snap.val();
            const ui = document.getElementById('uiStatus');
            
            if(u.status === 'pending_user') {
                ui.innerHTML = `<p class="text-yellow-400 font-bold text-xl">會員資格審核中</p><p class="text-gray-400 mt-2">請等待管理員審核您的資料。</p>`;
            } else if(u.status === 'official_user') {
                ui.innerHTML = `<p class="text-green-400 font-bold text-xl">資格已開通</p>
                                <button onclick="applyLoan()" class="mt-4 bg-indigo-600 w-full py-3 rounded-xl font-bold">申請貸款</button>`;
            } else if(u.status === 'pending_loan') {
                ui.innerHTML = `<p class="text-blue-400 font-bold text-xl">貸款審核中</p>`;
            } else if(u.status === 'active') {
                ui.innerHTML = `<p class="text-indigo-400 font-bold text-xl">線上會員 (借款中)</p>
                                <div class="mt-4 p-4 bg-gray-900 rounded-xl text-left text-sm">
                                    <p>剩餘應繳：<span class="text-pink-500 font-bold">$${u.remainingAmount}</span></p>
                                </div>`;
            } else if(u.status === 'finished') {
                ui.innerHTML = `<p class="text-green-500 font-bold text-xl">正常下車 (已還清)</p>`;
            }
        });

        function applyLoan() {
            const amt = prompt("輸入申請金額：", "50000");
            if(amt) db.ref('users/' + userPhone).update({ status: 'pending_loan', loanLimit: amt });
        }
    </script>
</body>
</html>
