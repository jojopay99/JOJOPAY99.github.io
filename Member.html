<body class="bg-gray-900 text-white p-6">
    <div id="ui" class="max-w-2xl mx-auto bg-gray-800 p-8 rounded-3xl">資料載入中...</div>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        const id = localStorage.getItem('uId');
        db.ref('users/'+id).on('value', s => {
            const u = s.val();
            document.getElementById('ui').innerHTML = `
                <h1 class="text-2xl font-bold">${u.name}</h1>
                <p class="mt-4 text-gray-400">目前狀態: <span class="text-white">${u.status}</span></p>
                <p class="text-2xl font-bold text-green-400 mt-2">核准額度: $${u.loanLimit}</p>`;
        });
    </script>
</body>
