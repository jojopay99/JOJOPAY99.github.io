<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJOPAY | 完整註冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: radial-gradient(circle at top, #1c1c3d 0%, #0a0a14 100%); color: white; }
        .form-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .input-box { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; padding: 12px; border-radius: 12px; margin-top: 4px; color: white; outline: none; font-size: 14px; }
        .upload-item { background: rgba(255, 255, 255, 0.03); border: 2px dashed rgba(255, 255, 255, 0.15); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 16 / 10; cursor: pointer; position: relative; overflow: hidden; }
        .upload-item img { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }
        .kyc-box { background: rgba(236, 72, 153, 0.05); border: 1px solid rgba(236, 72, 153, 0.2); border-radius: 20px; padding: 20px; }
        .contact-row { background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 10px; }
    </style>
</head>
<body class="p-4 pb-24">
    <div class="max-w-md mx-auto">
        <div class="mb-6 flex justify-between items-center">
            <a href="index.html" class="text-gray-400 hover:text-white transition-colors text-sm">⬅️ 返回首頁</a>
            <h1 class="text-xl font-bold text-indigo-400">填寫個人資料</h1>
        </div>
        
        <div class="form-card p-6 space-y-8">
            <section class="space-y-4">
                <h2 class="font-bold border-l-4 border-indigo-500 pl-2 text-indigo-300 text-lg">基本資料</h2>
                <input type="text" id="name" class="input-box" placeholder="真實姓名">
                <input type="text" id="idCard" class="input-box" placeholder="身分證字號">
                <div class="flex gap-2">
                    <input type="tel" id="phone" class="input-box" placeholder="手機號碼">
                    <button onclick="alert('驗證碼已發送')" class="bg-indigo-600 px-4 rounded-xl text-xs mt-1">發送</button>
                </div>
                <input type="text" id="vCode" class="input-box" placeholder="驗證碼 (1234)">
                <input type="text" id="hAddr" class="input-box" placeholder="戶籍地址">
                <input type="text" id="cAddr" class="input-box" placeholder="現居地址">
                <input type="text" id="bank" class="input-box" placeholder="撥款帳戶 (銀行+帳號)">
            </section>

            <section class="space-y-4">
                <h2 class="font-bold border-l-4 border-indigo-500 pl-2 text-indigo-300 text-lg">工作資訊</h2>
                <select id="jobType" class="input-box bg-gray-800">
                    <option value="">選擇職業類型</option>
                    <option value="學生">學生</option>
                    <option value="上班族">上班族</option>
                    <option value="軍公教">軍公教</option>
                    <option value="自由業">自由業</option>
                </select>
                <input type="text" id="compName" class="input-box" placeholder="公司/學校名稱">
                <input type="text" id="compAddr" class="input-box" placeholder="公司/學校地址">
                <input type="tel" id="compTel" class="input-box" placeholder="公司/學校電話">
            </section>

            <section class="space-y-4">
                <h2 class="font-bold border-l-4 border-indigo-500 pl-2 text-indigo-300 text-lg">緊急聯絡人</h2>
                <div id="contactList">
                    <div class="contact-row space-y-2">
                        <div class="flex gap-2">
                            <input type="text" placeholder="關係" class="input-box text-sm">
                            <input type="text" placeholder="姓名" class="input-box text-sm">
                        </div>
                        <input type="tel" placeholder="聯絡電話" class="input-box text-sm">
                    </div>
                </div>
                <button onclick="addContact()" class="w-full py-2 border border-dashed border-gray-600 rounded-xl text-xs text-gray-400">+ 新增聯絡人</button>
            </section>

            <section class="space-y-4">
                <h2 class="font-bold border-l-4 border-indigo-500 pl-2 text-indigo-300 text-lg">證件上傳</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="upload-item" onclick="triggerUpload('f1')"><span id="t-f1">🪪 正面</span><img id="img-f1"><input type="file" id="f1" class="hidden" onchange="preview(this, 'f1')"></div>
                    <div class="upload-item" onclick="triggerUpload('f2')"><span id="t-f2">🪪 反面</span><img id="img-f2"><input type="file" id="f2" class="hidden" onchange="preview(this, 'f2')"></div>
                    <div class="upload-item" onclick="triggerUpload('f3')"><span id="t-f3">🏦 存摺</span><img id="img-f3"><input type="file" id="f3" class="hidden" onchange="preview(this, 'f3')"></div>
                    <div class="upload-item" onclick="triggerUpload('f4')"><span id="t-f4">📜 證明</span><img id="img-f4"><input type="file" id="f4" class="hidden" onchange="preview(this, 'f4')"></div>
                </div>
            </section>

            <section class="kyc-box space-y-4">
                <h2 class="font-bold text-pink-400 flex items-center gap-2 text-lg">📸 身分認證 (KYC)</h2>
                <div class="bg-black/40 p-3 rounded-lg text-[11px] leading-relaxed text-gray-300 border border-pink-500/30">
                    請手持白紙寫下：<br>本人 <span class="text-pink-400 font-bold">姓名</span> 於 <span class="text-pink-400 font-bold">今日日期</span><br>申請 <span class="text-indigo-400">JOJOPAY</span> 會員
                </div>
                <div class="upload-item border-pink-500/40 text-pink-300 py-10" onclick="triggerUpload('f5')">
                    <span id="t-f5">🤳 點擊拍攝手持自拍</span>
                    <img id="img-f5">
                    <input type="file" id="f5" class="hidden" onchange="preview(this, 'f5')">
                </div>
            </section>

            <button onclick="submitAll()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold text-lg active:scale-95 transition-all shadow-xl">送出申請資料</button>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        function addContact() {
            const div = document.createElement('div');
            div.className = "contact-row space-y-2";
            div.innerHTML = `<div class="flex gap-2"><input type="text" placeholder="關係" class="input-box text-sm"><input type="text" placeholder="姓名" class="input-box text-sm"></div><input type="tel" placeholder="聯絡電話" class="input-box text-sm">`;
            document.getElementById('contactList').appendChild(div);
        }

        function triggerUpload(id) { document.getElementById(id).click(); }

        function preview(input, id) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('img-' + id).src = e.target.result;
                    document.getElementById('img-' + id).style.display = 'block';
                    document.getElementById('t-' + id).style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function submitAll() {
            const id = document.getElementById('idCard').value.trim().toUpperCase();
            if(!id || document.getElementById('vCode').value !== '1234') return alert("請檢查身分證字號或驗證碼");

            const data = {
                name: document.getElementById('name').value,
                idCard: id,
                phone: document.getElementById('phone').value,
                hAddr: document.getElementById('hAddr').value,
                cAddr: document.getElementById('cAddr').value,
                bank: document.getElementById('bank').value,
                job: document.getElementById('jobType').value,
                compName: document.getElementById('compName').value,
                compTel: document.getElementById('compTel').value,
                status: 'pending_user', // 統一設定為待資格審核
                loanLimit: 0
            };

            db.ref('users/' + id).set(data).then(() => {
                alert("申請成功！請等候審核");
                window.location.href = "index.html";
            });
        }
    </script>
</body>
</html>
