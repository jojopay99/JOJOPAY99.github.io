<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 完整會員註冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        input:focus { background-color: #000000 !important; border-color: #4f46e5 !important; color: white !important; outline: none; }
        body { background: #0a0a0f; color: white; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-xl mx-auto bg-[#151520] p-8 rounded-3xl border border-gray-700">
        <a href="index.html" class="text-indigo-400 mb-4 block underline">← 回首頁</a>
        <h1 class="text-2xl font-bold mb-6 text-indigo-400">會員資料登記</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="name" placeholder="姓名" class="w-full p-3 bg-black rounded-xl border border-gray-700 text-white">
            <input type="text" id="idCard" placeholder="身分證字號" class="w-full p-3 bg-black rounded-xl border border-gray-700 text-white">
            <input type="tel" id="phone" placeholder="手機號碼" class="w-full p-3 bg-black rounded-xl border border-gray-700 text-white">
            <input type="text" id="address" placeholder="居住地址" class="w-full p-3 bg-black rounded-xl border border-gray-700 text-white">
            <input type="text" id="job" placeholder="工作單位" class="w-full p-3 bg-black rounded-xl border border-gray-700 text-white">
            <input type="text" id="salary" placeholder="月薪" class="w-full p-3 bg-black rounded-xl border border-gray-700 text-white">
            <input type="text" id="bank" placeholder="撥款帳戶" class="w-full p-3 bg-black rounded-xl border border-gray-700 text-white">
        </div>

        <h2 class="mt-8 mb-4 font-bold text-gray-300">聯絡人 (至少填寫3名)</h2>
        <div id="contactList">
            <div class="flex gap-2 mb-2">
                <input type="text" class="contact-name w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="姓名">
                <input type="text" class="contact-rel w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="關係">
                <input type="text" class="contact-tel w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="電話">
            </div>
             <div class="flex gap-2 mb-2">
                <input type="text" class="contact-name w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="姓名">
                <input type="text" class="contact-rel w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="關係">
                <input type="text" class="contact-tel w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="電話">
            </div>
             <div class="flex gap-2 mb-2">
                <input type="text" class="contact-name w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="姓名">
                <input type="text" class="contact-rel w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="關係">
                <input type="text" class="contact-tel w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="電話">
            </div>
        </div>
        <button onclick="addContact()" class="text-sm text-indigo-400 mb-6">+ 新增一位聯絡人</button>

        <h2 class="mb-4 font-bold text-gray-300">證件上傳</h2>
        <div class="space-y-4">
            <div onclick="document.getElementById('f1').click()" class="border-2 border-dashed border-gray-700 rounded-2xl p-6 text-center cursor-pointer hover:border-indigo-500 transition">
                <p id="btn-f1" class="text-gray-400">點擊上傳身分證正面</p>
            </div>
            <div onclick="document.getElementById('f2').click()" class="border-2 border-dashed border-gray-700 rounded-2xl p-6 text-center cursor-pointer hover:border-indigo-500 transition">
                <p id="btn-f2" class="text-gray-400">點擊上傳身分證反面</p>
            </div>
            <div onclick="document.getElementById('f3').click()" class="border-2 border-dashed border-gray-700 rounded-2xl p-6 text-center cursor-pointer hover:border-indigo-500 transition">
                <p id="btn-f3" class="text-gray-400">點擊上傳健保卡正面</p>
            </div>
            
            <div class="bg-[#1f1f2e] p-4 rounded-2xl border border-indigo-900">
                <p class="text-indigo-300 text-sm mb-2 font-bold">⚠️ 自拍認證教學：</p>
                <p class="text-gray-300 text-xs mb-3">請左手持身分證（勿擋住字面及照片）與您一起自拍，確保影像清晰。</p>
                <div onclick="document.getElementById('f5').click()" class="border-2 border-dashed border-gray-600 rounded-xl p-4 text-center cursor-pointer">
                    <p id="btn-f5" class="text-gray-400">點擊上傳自拍照片</p>
                </div>
            </div>

            <div onclick="document.getElementById('f4').click()" class="border-2 border-dashed border-gray-700 rounded-2xl p-6 text-center cursor-pointer">
                <p id="btn-f4" class="text-gray-400">點擊上傳其他加分證件 (選填)</p>
            </div>
        </div>
        
        <input type="file" id="f1" class="hidden" onchange="up(this,'f1')">
        <input type="file" id="f2" class="hidden" onchange="up(this,'f2')">
        <input type="file" id="f3" class="hidden" onchange="up(this,'f3')">
        <input type="file" id="f4" class="hidden" onchange="up(this,'f4')">
        <input type="file" id="f5" class="hidden" onchange="up(this,'f5')">
        
        <button onclick="reg()" class="w-full mt-8 bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 text-white">送出申請</button>
    </div>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        let imgs = {};

        function addContact() {
            const div = document.createElement('div');
            div.className = 'flex gap-2 mb-2';
            div.innerHTML = `<input type="text" class="contact-name w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="姓名"><input type="text" class="contact-rel w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="關係"><input type="text" class="contact-tel w-1/3 p-2 bg-black rounded border border-gray-700 text-white" placeholder="電話">`;
            document.getElementById('contactList').appendChild(div);
        }

        function up(input, id) { 
            const r = new FileReader(); 
            r.onload = e => { imgs[id] = e.target.result; document.getElementById('btn-'+id).innerText = "✅ 已上傳"; }; 
            r.readAsDataURL(input.files[0]); 
        }

        function reg() {
            let contacts = [];
            document.querySelectorAll('#contactList > div').forEach(d => {
                contacts.push({
                    name: d.querySelector('.contact-name').value, 
                    rel: d.querySelector('.contact-rel').value, 
                    tel: d.querySelector('.contact-tel').value
                });
            });

            const id = document.getElementById('idCard').value.trim().toUpperCase();
            if(!id) { alert("請填寫身分證字號"); return; }
            
            db.ref('users/'+id).set({
                name: document.getElementById('name').value,
                password: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                job: document.getElementById('job').value,
                salary: document.getElementById('salary').value,
                bank: document.getElementById('bank').value,
                contacts: contacts,
                imgs: imgs,
                status: 'pending_user',
                loanAmount: 5000,
                payCount: 0
            }).then(() => { 
                alert("註冊成功！系統已預設額度為 5000 元。"); 
                window.location.href = "index.html"; 
            }).catch(err => { alert("錯誤: " + err.message); });
        }
    </script>
</body>
</html>
