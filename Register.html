<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJOPAY | 快速註冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div class="max-w-md mx-auto bg-gray-800 rounded-3xl p-8 shadow-2xl border border-gray-700">
        <h2 class="text-2xl font-bold text-center text-indigo-400 mb-6">建立新帳戶</h2>
        <div class="space-y-4">
            <input type="text" id="name" placeholder="真實姓名" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl outline-none focus:border-indigo-500">
            <input type="tel" id="phone" placeholder="手機號碼 (登入帳號)" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl outline-none focus:border-indigo-500">
            <input type="password" id="pw" placeholder="設定密碼" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl outline-none focus:border-indigo-500">
            <input type="text" id="bank" placeholder="撥款銀行帳號" class="w-full p-4 bg-gray-900 border border-gray-700 rounded-xl outline-none focus:border-indigo-500">
            <button onclick="reg()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold text-lg transition-all active:scale-95">送出註冊申請</button>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        function reg() {
            const p = document.getElementById('phone').value;
            const n = document.getElementById('name').value;
            const pw = document.getElementById('pw').value;
            const b = document.getElementById('bank').value;

            if(!p || !n || !pw) return alert("請填寫完整資料");

            db.ref('users/' + p).set({
                name: n,
                phone: p,
                password: pw,
                bank: b,
                status: 'pending_user', // 待審核會員資格
                loanLimit: 0,
                remainingAmount: 0
            }).then(() => {
                alert("註冊成功！請等待管理員審核會員資格。");
                location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
