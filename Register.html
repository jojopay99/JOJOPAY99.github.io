<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JOJOPAY | 完整會員註冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>body { background: #0a0a0f; color: white; }</style>
</head>
<body class="p-6">
    <div class="max-w-xl mx-auto bg-[#151520] p-8 rounded-3xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-indigo-400">會員資料登記</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <input type="text" id="name" placeholder="姓名" class="w-full p-3 bg-black rounded-xl border border-gray-700">
            <input type="text" id="idCard" placeholder="身分證字號" class="w-full p-3 bg-black rounded-xl border border-gray-700">
            <input type="tel" id="phone" placeholder="手機號碼(密碼)" class="w-full p-3 bg-black rounded-xl border border-gray-700">
            <input type="text" id="address" placeholder="居住地址" class="w-full p-3 bg-black rounded-xl border border-gray-700">
            <input type="text" id="job" placeholder="工作單位" class="w-full p-3 bg-black rounded-xl border border-gray-700">
            <input type="text" id="salary" placeholder="月薪" class="w-full p-3 bg-black rounded-xl border border-gray-700">
            <input type="text" id="bank" placeholder="撥款帳戶" class="w-full p-3 bg-black rounded-xl border border-gray-700">
        </div>

        <h2 class="text-lg font-bold mb-4">緊急聯絡人</h2>
        <div id="contactsArea" class="space-y-4 mb-4">
            <div class="grid grid-cols-3 gap-2 contact-row">
                <input type="text" placeholder="關係" class="p-2 bg-black rounded border border-gray-700">
                <input type="text" placeholder="姓名" class="p-2 bg-black rounded border border-gray-700">
                <input type="text" placeholder="電話" class="p-2 bg-black rounded border border-gray-700">
            </div>
        </div>
        <button onclick="addContact()" class="w-full mb-8 bg-gray-700 py-2 rounded-xl text-sm text-gray-300">+ 新增一位聯絡人</button>

        <h2 class="text-lg font-bold mb-4">證件上傳</h2>
        <div class="grid grid-cols-1 gap-3">
            <button onclick="document.getElementById('f1').click()" class="bg-gray-800 p-4 rounded-xl text-left" id="btn-f1">1. 身分證正面</button>
            <button onclick="document.getElementById('f2').click()" class="bg-gray-800 p-4 rounded-xl text-left" id="btn-f2">2. 身分證反面</button>
            <button onclick="document.getElementById('f3').click()" class="bg-gray-800 p-4 rounded-xl text-left" id="btn-f3">3. 健保卡</button>
            <button onclick="document.getElementById('f4').click()" class="bg-gray-800 p-4 rounded-xl text-left" id="btn-f4">4. 加分項目</button>
            <button onclick="document.getElementById('f5').click()" class="bg-gray-800 p-4 rounded-xl text-left" id="btn-f5">5. 自拍認證</button>
        </div>
        <div class="mt-4 p-4 bg-black rounded-xl text-xs text-gray-500 border border-dashed border-gray-700">
            教學：請依照上方順序上傳。自拍時請手持身分證於臉部旁。
        </div>

        <input type="file" id="f1" class="hidden" onchange="up(this,'f1')"><input type="file" id="f2" class="hidden" onchange="up(this,'f2')">
        <input type="file" id="f3" class="hidden" onchange="up(this,'f3')"><input type="file" id="f4" class="hidden" onchange="up(this,'f4')">
        <input type="file" id="f5" class="hidden" onchange="up(this,'f5')">
        
        <button onclick="reg()" class="w-full mt-8 bg-indigo-600 py-4 rounded-xl font-bold">送出申請</button>
    </div>

    <script>
        const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
        let imgs = {};
        function addContact() {
            const div = document.createElement('div');
            div.className = 'grid grid-cols-3 gap-2 contact-row';
            div.innerHTML = '<input type="text" placeholder="關係" class="p-2 bg-black rounded border border-gray-700"><input type="text" placeholder="姓名" class="p-2 bg-black rounded border border-gray-700"><input type="text" placeholder="電話" class="p-2 bg-black rounded border border-gray-700">';
            document.getElementById('contactsArea').appendChild(div);
        }
        function up(input, id) { const r = new FileReader(); r.onload = e => { imgs[id] = e.target.result; document.getElementById('btn-'+id).innerText = "✅ 已上傳"; }; r.readAsDataURL(input.files[0]); }
        function reg() {
            const id = document.getElementById('idCard').value.trim().toUpperCase();
            let contacts = [];
            document.querySelectorAll('.contact-row').forEach(row => {
                contacts.push({ rel: row.children[0].value, name: row.children[1].value, phone: row.children[2].value });
            });
            db.ref('users/'+id).set({
                name: document.getElementById('name').value, password: document.getElementById('phone').value,
                address: document.getElementById('address').value, job: document.getElementById('job').value,
                salary: document.getElementById('salary').value, bank: document.getElementById('bank').value,
                contacts: contacts, status: 'pending_user', loanLimit: 0, imgs: imgs
            }).then(() => { alert("申請成功"); window.location.href="index.html"; });
        }
    </script>
</body>
</html>
