<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOJOPAY | 完整註冊系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: radial-gradient(circle at top, #1c1c3d 0%, #0a0a14 100%); color: white; min-height: 100vh; }
        .form-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .input-box { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; padding: 12px; border-radius: 12px; margin-top: 4px; color: white; outline: none; }
        .upload-item { background: rgba(255, 255, 255, 0.03); border: 2px dashed rgba(255, 255, 255, 0.15); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 16 / 10; cursor: pointer; position: relative; overflow: hidden; }
        .upload-item img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="p-4 pb-24">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold text-indigo-400 mb-6 text-center">JOJOPAY 會員註冊</h1>
        
        <div class="form-card p-6 space-y-6">
            <section class="space-y-3">
                <h2 class="font-bold text-indigo-300 border-l-4 border-indigo-500 pl-2">基本資料</h2>
                <input type="text" id="name" class="input-box" placeholder="真實姓名">
                <input type="text" id="idCard" class="input-box" placeholder="身分證字號">
                <input type="tel" id="phone" class="input-box" placeholder="手機號碼 (將作為登入帳號)">
                <input type="password" id="password" class="input-box" placeholder="設定登入密碼">
                <input type="text" id="bank" class="input-box" placeholder="撥款帳戶 (銀行+帳號)">
            </section>

            <section class="space-y-3">
                <h2 class="font-bold text-indigo-300 border-l-4 border-indigo-500 pl-2">證件上傳</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="upload-item" onclick="triggerUpload('f1')"><span id="t-f1" class="text-xs">🪪 正面</span><img id="img-f1" class="hidden"><input type="file" id="f1" class="hidden" onchange="preview(this, 'f1')"></div>
                    <div class="upload-item" onclick="triggerUpload('f2')"><span id="t-f2" class="text-xs">🪪 反面</span><img id="img-f2" class="hidden"><input type="file" id="f2" class="hidden" onchange="preview(this, 'f2')"></div>
                    <div class="upload-item" onclick="triggerUpload('f3')"><span id="t-f3" class="text-xs">🏦 存摺</span><img id="img-f3" class="hidden"><input type="file" id="f3" class="hidden" onchange="preview(this, 'f3')"></div>
                    <div class="upload-item" onclick="triggerUpload('f5')"><span id="t-f5" class="text-xs text-pink-400">🤳 自拍</span><img id="img-f5" class="hidden"><input type="file" id="f5" class="hidden" onchange="preview(this, 'f5')"></div>
                </div>
            </section>

            <button onclick="submitAll()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold shadow-lg">確認送出申請</button>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let imgData = {}; // 暫存圖片字串

        function triggerUpload(id) { document.getElementById(id).click(); }
        
        function preview(input, id) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('img-'+id).src = e.target.result;
                    document.getElementById('img-'+id).classList.remove('hidden');
                    document.getElementById('t-'+id).classList.add('hidden');
                    imgData[id] = e.target.result; // 存入暫存區
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function submitAll() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if(!phone || !password) return alert("手機與密碼為必填！");

            const data = {
                name: document.getElementById('name').value,
                idCard: document.getElementById('idCard').value,
                phone: phone,
                password: password, // 加入密碼欄位，解決登入錯誤問題
                bank: document.getElementById('bank').value,
                status: 'pending_user',
                loanLimit: 0,
                img_f1: imgData['f1'] || '',
                img_f2: imgData['f2'] || '',
                img_f3: imgData['f3'] || '',
                img_f5: imgData['f5'] || ''
            };

            db.ref('users/' + phone).set(data).then(() => {
                alert("註冊成功！系統將跳轉至登入頁");
                window.location.href = "login.html"; // 請確保你有此檔案
            });
        }
    </script>
</body>
</html>
