<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>會員註冊</title><script src="https://cdn.tailwindcss.com"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script></head>
<body class="bg-gray-900 text-white p-6"><div class="max-w-md mx-auto space-y-4">
<h1 class="text-2xl font-bold">會員註冊</h1>
<input type="text" id="name" placeholder="真實姓名" class="w-full p-3 bg-gray-800 rounded">
<input type="text" id="idCard" placeholder="身分證字號 (帳號)" class="w-full p-3 bg-gray-800 rounded">
<input type="tel" id="phone" placeholder="手機號碼 (密碼)" class="w-full p-3 bg-gray-800 rounded">
<input type="text" id="address" placeholder="居住地址" class="w-full p-3 bg-gray-800 rounded">
<input type="text" id="job" placeholder="工作單位" class="w-full p-3 bg-gray-800 rounded">
<div class="grid grid-cols-2 gap-2">
<input type="file" id="f1" class="hidden" onchange="read(this, 'f1')"><button onclick="document.getElementById('f1').click()" class="bg-gray-700 p-2 rounded text-sm">身分證正面</button>
<input type="file" id="f2" class="hidden" onchange="read(this, 'f2')"><button onclick="document.getElementById('f2').click()" class="bg-gray-700 p-2 rounded text-sm">身分證反面</button>
<input type="file" id="f3" class="hidden" onchange="read(this, 'f3')"><button onclick="document.getElementById('f3').click()" class="bg-gray-700 p-2 rounded text-sm">健保卡</button>
<input type="file" id="f5" class="hidden" onchange="read(this, 'f5')"><button onclick="document.getElementById('f5').click()" class="bg-gray-700 p-2 rounded text-sm">自拍照片</button>
</div>
<button onclick="reg()" class="w-full bg-indigo-600 py-4 rounded font-bold">送出申請</button>
</div>
<script>
const db = firebase.initializeApp({ databaseURL: "https://jojopay-cefff-default-rtdb.firebaseio.com/" }).database();
let imgs = {};
function read(input, id) { const r = new FileReader(); r.onload = e => imgs[id] = e.target.result; r.readAsDataURL(input.files[0]); }
function reg() {
const id = document.getElementById('idCard').value.trim().toUpperCase();
const ph = document.getElementById('phone').value.trim();
db.ref('users/' + id).set({
name: document.getElementById('name').value, idCard: id, phone: ph, password: ph,
address: document.getElementById('address').value, job: document.getElementById('job').value,
status: 'pending_user', loanLimit: 0, imgs: imgs
}).then(() => { alert("註冊成功"); window.location.href="index.html"; });
}
</script></body></html>
